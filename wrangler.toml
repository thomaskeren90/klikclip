name = "late-boat-8297"
main = "worker.js"
compatibility_date = "2024-12-01"

# Route API calls through the Worker
# KV not needed — using in-memory fallback
routes = [
  { pattern = "klikclip.com/api/*" },
  { pattern = "klikclip.com/health" },
  { pattern = "klikclip.com/transcript" },
  { pattern = "klikclip.com/summarize" },
  { pattern = "klikclip.com/ask" }
]

# Serve static assets for non-API routes
[site]
bucket = "./public"
