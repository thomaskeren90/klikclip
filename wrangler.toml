name = "late-boat-8297"
main = "worker.js"
compatibility_date = "2024-12-01"

# Route API calls through the Worker
routes = [
  { pattern = "klikclip.com/api/*", zone_id = "klikclip.com" },
  { pattern = "klikclip.com/health", zone_id = "klikclip.com" },
  { pattern = "klikclip.com/transcript", zone_id = "klikclip.com" },
  { pattern = "klikclip.com/summarize", zone_id = "klikclip.com" },
  { pattern = "klikclip.com/ask", zone_id = "klikclip.com" }
]

# Serve static assets for everything else
[site]
bucket = "./public"

# KV namespace
[[kv_namespaces]]
binding = "KLIKCLIP"
id = ""
